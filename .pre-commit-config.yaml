# .pre-commit-config.yaml
repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
    -   id: check-yaml
        exclude: charts
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
-   repo: local
    hooks:
    -   id: cargo-fmt-check
        name: cargo fmt --check
        description: Ensure Rust code is formatted.
        entry: cargo fmt -- --check
        language: rust
        types: [rust]
        pass_filenames: false
    -   id: cargo-check-workspace
        name: cargo check --workspace
        description: Run cargo check across the workspace for static analysis.
        entry: cargo check --workspace
        language: rust
        pass_filenames: false
    -   id: cargo-build-workspace
        name: cargo build --workspace
        description: Ensure the workspace builds in debug mode.
        entry: cargo build --workspace
        language: rust
        pass_filenames: false
    -   id: cargo-test-workspace
        name: cargo test --workspace
        description: Execute all workspace tests.
        entry: cargo test --workspace
        language: rust
        pass_filenames: false
