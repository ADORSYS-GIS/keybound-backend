openapi: 3.0.3
info:
  title: Customer Registration Staff Review API
  version: 1.0.0
  description: KYC review endpoints available only to staff reviewers.
servers:
  - url: 'https://api.example.com'
    description: Example production server
tags:
  - name: KYC Review
    description: Endpoints for review staff to operate on KYC submissions.
paths:
  /api/kyc/staff/submissions:
    get:
      tags:
        - KYC Review
      summary: List submissions
      description: Return paginated KYC submissions filtered by status or search text.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
          description: 'Optional status filter (pending, approved, rejected).'
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Optional text to search across names and emails.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number (default 1).
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
          description: Page size (default 20).
      responses:
        '200':
          description: Page of KYC submissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KycSubmissionsResponse'
        '401':
          description: Unauthorized.
  '/api/kyc/staff/submissions/{userId}':
    get:
      tags:
        - KYC Review
      summary: Get submission
      description: Return detailed submission for a single customer.
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User ID.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number for documents list (default 1).
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
          description: Page size for documents list (default 20).
      responses:
        '200':
          description: Detailed submission.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KycSubmissionDetailResponse'
        '401':
          description: Unauthorized.
        '404':
          description: Submission not found.
  '/api/kyc/staff/submissions/{userId}/approve':
    post:
      tags:
        - KYC Review
      summary: Approve KYC
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KycApprovalRequest'
      responses:
        '200':
          description: KYC approved.
        '400':
          description: Validation failed.
        '401':
          description: Unauthorized.
  '/api/kyc/staff/submissions/{userId}/reject':
    post:
      tags:
        - KYC Review
      summary: Reject KYC
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KycRejectionRequest'
      responses:
        '200':
          description: KYC rejected.
        '400':
          description: Validation failed.
        '401':
          description: Unauthorized.
  '/api/kyc/staff/submissions/{userId}/request-info':
    post:
      tags:
        - KYC Review
      summary: Request more info
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KycRequestInfoRequest'
      responses:
        '200':
          description: Additional info requested.
        '400':
          description: Validation failed.
        '401':
          description: Unauthorized.
  '/api/kyc/staff/submissions/{userId}/documents/{documentId}/download-url':
    post:
      tags:
        - KYC Review
      summary: Get presigned download URL for a document
      description: Returns a short-lived presigned URL to download a document from S3.
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: User ID.
        - name: documentId
          in: path
          required: true
          schema:
            type: string
          description: Document ID.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignedDownloadUrlRequest'
      responses:
        '200':
          description: Presigned download URL created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignedDownloadUrlResponse'
        '401':
          description: Unauthorized.
        '404':
          description: Submission or document not found.
        '410':
          description: Document no longer available (e.g., deleted or expired).
        '429':
          description: Too many requests.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    KycSubmissionsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/KycSubmissionSummary'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
    KycSubmissionSummary:
      type: object
      properties:
        externalId:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phoneNumber:
          type: string
        kycTier:
          type: integer
        kycStatus:
          type: string
        submittedAt:
          type: string
    KycSubmissionDetailResponse:
      type: object
      properties:
        externalId:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phoneNumber:
          type: string
        dateOfBirth:
          type: string
        nationality:
          type: string
        kycTier:
          type: integer
        kycStatus:
          type: string
        documents:
          type: array
          items:
            $ref: '#/components/schemas/KycDocumentDto'
        submittedAt:
          type: string
        reviewedAt:
          type: string
        reviewedBy:
          type: string
        rejectionReason:
          type: string
        reviewNotes:
          type: string
        page:
          type: integer
        pageSize:
          type: integer
        totalDocuments:
          type: integer
    KycDocumentDto:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        fileName:
          type: string
        mimeType:
          type: string
        url:
          type: string
          format: uri
        uploadedAt:
          type: string
    KycApprovalRequest:
      type: object
      required:
        - newTier
      properties:
        newTier:
          type: integer
          minimum: 1
          maximum: 3
        notes:
          type: string
    KycRejectionRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
          maxLength: 100
        notes:
          type: string
          maxLength: 500
    KycRequestInfoRequest:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          maxLength: 500
    PresignedDownloadUrlRequest:
      type: object
      properties:
        expiresInSeconds:
          type: integer
          minimum: 60
          maximum: 3600
          default: 300
          description: URL TTL in seconds (default 300, max 3600).
        responseContentDisposition:
          type: string
          description: >
            Optional content disposition override (e.g. "attachment; filename=\"id-front.jpg\"").

    PresignedDownloadUrlResponse:
      type: object
      required:
        - url
        - expiresAt
      properties:
        url:
          type: string
          format: uri
          description: Presigned S3 URL for downloading the document.
        expiresAt:
          type: string
          format: date-time
          description: Absolute expiration timestamp for the URL.
        documentId:
          type: string
        fileName:
          type: string
        mimeType:
          type: string