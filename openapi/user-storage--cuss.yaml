openapi: 3.1.0
info:
  title: Customer Registration Service - Register
  version: 0.1.3
  description: User registration endpoint for new customers.
servers:
- url: 'https://api.example.com'
  description: Example production server
tags:
- name: Registration
  description: Customer self-registration operations.
security:
- BearerAuth: []
paths:
  /api/registration/register:
    post:
      tags:
      - Registration
      summary: Register a new customer
      description: Creates Fineract client and Keycloak user for self-service customer.
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
      responses:
        '201':
          description: Registration successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationResponse'
        '400':
          description: Validation error or email already exists.
        '500':
          description: Registration failed.
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token for user registration service.
  schemas:
    RegistrationRequest:
      type: object
      required:
      - fullname
      properties:
        fullname:
          type: string
    RegistrationResponse:
      type: object
      properties:
        externalId:
          type: string
        status:
          type: string
        message:
          type: string
        nextSteps:
          type: array
          items:
            type: string
