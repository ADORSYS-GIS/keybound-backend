apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-storage-temp
  namespace: user-storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-storage-temp
  template:
    metadata:
      labels:
        app: user-storage-temp
    spec:
      initContainers:
        - name: migrate
          image: ghcr.io/adorsys-gis/user-storage:latest
          args:
            - migrate
            - --config-path
            - /app/config/default.yaml
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: url
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
      containers:
        - name: user-storage
          image: ghcr.io/adorsys-gis/user-storage:latest
          args:
            - serve
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: url
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: user-storage-config
