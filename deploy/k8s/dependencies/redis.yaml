apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: user-storage-deps
spec:
  ports:
    - port: 6379
  selector:
    app: redis
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: user-storage-deps
spec:
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: user-storage
type: Opaque
stringData:
  url: "redis://redis.user-storage-deps.svc.cluster.local:6379"
