config:
  server:
    address: "0.0.0.0"
    port: 3000
    tls:
      cert_path: "./config/tls/api.crt"
      key_path: "./config/tls/api.key"
  logging:
    level: "info"
    log_requests_enabled: false
  database:
    url: "${DATABASE_URL}"
    pool_size: 10
  runtime:
    mode: shared
  redis:
    url: "${REDIS_URL}"
    worker_lock_ttl_seconds: 30
    worker_lock_renew_seconds: 10
  storage:
    type: minio
    minio:
      endpoint: "http://minio.user-storage-deps.svc.cluster.local:9000"
      region: "us-east-1"
      access_key: "minioadmin"
      secret_key: "minioadmin"
      bucket: "user-storage-dev"
      force_path_style: true
      presign_ttl_seconds: 900
  oauth2:
    issuer: "http://keycloak.user-storage-deps.svc.cluster.local:9026/realms/master"
    jwks_uri: "http://keycloak.user-storage-deps.svc.cluster.local:9026/realms/master/protocol/openid-connect/certs"
  sms:
    provider: console
  kc:
    enabled: true
    base_path: "/kc"
    max_clock_skew_seconds: 60
    max_body_bytes: 262144
  bff:
    enabled: true
    base_path: "/bff"
  staff:
    enabled: true
    base_path: "/staff"
  cuss:
    api_url: "http://cuss-wiremock.user-storage-deps.svc.cluster.local:8080"

controllers:
  user-storage:
    type: deployment
    replicas: 1
    initContainers:
      migrate:
        image:
          repository: ghcr.io/adorsys-gis/user-storage
          tag: "latest"
        args:
          - migrate
          - --config-path
          - /app/config/default.yaml
        env:
          DATABASE_URL:
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: url
          TZ: "UTC"
    containers:
      user-storage:
        image:
          repository: ghcr.io/adorsys-gis/user-storage
          tag: "latest"
          pullPolicy: IfNotPresent
        args:
          - serve
          - --config-path
          - /app/config/default.yaml
          - --mode
          - server
        env:
          DATABASE_URL:
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: url
          REDIS_URL:
            valueFrom:
              secretKeyRef:
                name: redis-secret
                key: url
          TZ: "UTC"
        ports:
          - name: http
            containerPort: 3000

  worker:
    type: deployment
    replicas: 1
    containers:
      worker:
        image:
          repository: ghcr.io/adorsys-gis/user-storage
          tag: "latest"
          pullPolicy: IfNotPresent
        args:
          - worker
          - --config-path
          - /app/config/default.yaml
          - --mode
          - worker
        env:
          DATABASE_URL:
            valueFrom:
              secretKeyRef:
                name: postgres-secret
                key: url
          REDIS_URL:
            valueFrom:
              secretKeyRef:
                name: redis-secret
                key: url
          TZ: "UTC"
        ports:
          - name: http
            containerPort: 3000

  sms-gateway:
    type: deployment
    replicas: 1
    containers:
      sms-gateway:
        image:
          repository: ghcr.io/adorsys-gis/sms-gateway
          tag: "latest"
          pullPolicy: IfNotPresent
        args:
          - --config
          - /app/config/default.yaml
        ports:
          - name: http
            containerPort: 3001

persistence:
  flows:
    type: configMap
    name: user-storage-flows
    advancedMounts:
      user-storage:
        user-storage:
          - path: /app/flows
            readOnly: true
        migrate:
          - path: /app/flows
            readOnly: true
      worker:
        worker:
          - path: /app/flows
            readOnly: true
  config:
    type: configMap
    name: user-storage-config
    advancedMounts:
      user-storage:
        user-storage:
          - path: /app/config
            readOnly: true
        migrate:
          - path: /app/config
            readOnly: true
      worker:
        worker:
          - path: /app/config
            readOnly: true
      sms-gateway:
        sms-gateway:
          - path: /app/config
            readOnly: true

service:
  user-storage:
    controller: user-storage
    ports:
      http:
        port: 80
        targetPort: 3000
  sms-gateway:
    controller: sms-gateway
    ports:
      http:
        port: 80
        targetPort: 3001

ingress:
  user-storage:
    enabled: true
    className: nginx
    hosts:
      - host: api.verif.fyi
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: user-storage
              port: http
