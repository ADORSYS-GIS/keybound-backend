# Source: user-storage/templates/init.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-storage-worker
  labels:
    app.kubernetes.io/controller: worker
    app.kubernetes.io/instance: user-storage
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: user-storage
    app.kubernetes.io/version: 1.16.0
    helm.sh/chart: user-storage-0.1.0
  namespace: user-storage
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: worker
      app.kubernetes.io/name: user-storage
      app.kubernetes.io/instance: user-storage
  template:
    metadata:
      labels: 
        app.kubernetes.io/controller: worker
        app.kubernetes.io/instance: user-storage
        app.kubernetes.io/name: user-storage
    spec: 
      enableServiceLinks: false
      serviceAccountName: default
      automountServiceAccountToken: true
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      containers: 
        - args:
          - worker
          env:
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                key: url
                name: postgres-secret
          - name: REDIS_URL
            valueFrom:
              secretKeyRef:
                key: url
                name: redis-secret
          - name: TZ
            value: UTC
          image: ghcr.io/adorsys-gis/user-storage:latest
          imagePullPolicy: IfNotPresent
          name: worker
          ports:
          - containerPort: 3000
            name: http
