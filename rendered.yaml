# Source: user-storage/templates/init.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-storage
  labels:
    app.kubernetes.io/controller: user-storage
    app.kubernetes.io/instance: user-storage
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: user-storage
    app.kubernetes.io/version: 1.16.0
    helm.sh/chart: user-storage-0.1.0
  namespace: user-storage
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/controller: user-storage
      app.kubernetes.io/name: user-storage
      app.kubernetes.io/instance: user-storage
  template:
    metadata:
      labels: 
        app.kubernetes.io/controller: user-storage
        app.kubernetes.io/instance: user-storage
        app.kubernetes.io/name: user-storage
    spec: 
      enableServiceLinks: false
      serviceAccountName: default
      automountServiceAccountToken: true
      hostIPC: false
      hostNetwork: false
      hostPID: false
      dnsPolicy: ClusterFirst
      initContainers: 
        - args:
          - migrate
          - --config-path
          - /app/config/default.yaml
          env:
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                key: url
                name: postgres-secret
          - name: TZ
            value: UTC
          image: ghcr.io/adorsys-gis/user-storage:latest
          name: migrate
      containers: 
        - args:
          - serve
          env:
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                key: url
                name: postgres-secret
          - name: REDIS_URL
            valueFrom:
              secretKeyRef:
                key: url
                name: redis-secret
          - name: TZ
            value: UTC
          image: ghcr.io/adorsys-gis/user-storage:latest
          imagePullPolicy: IfNotPresent
          name: user-storage
          ports:
          - containerPort: 3000
            name: http
---
# Source: user-storage/templates/init.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: user-storage
  labels:
    app.kubernetes.io/instance: user-storage
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: user-storage
    app.kubernetes.io/version: 1.16.0
    helm.sh/chart: user-storage-0.1.0
  namespace: user-storage
spec:
  ingressClassName: nginx
  rules:
    - host: "user-storage.local"
      http:
        paths:
          - path: "/"
            pathType: Prefix
            backend:
              service:
                name: user-storage
                port:
                  number: 80
