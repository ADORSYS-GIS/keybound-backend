---
# Source: user-storage/templates/configmap-config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-storage-config
  labels:
    helm.sh/chart: user-storage-0.1.0
    app.kubernetes.io/name: user-storage
    app.kubernetes.io/instance: user-storage
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
data:
  default.yaml: |-
    database:
      url: "${DATABASE_URL}"
      pool_size: 10
    bff:
      enabled: true
      base-path: /bff
    staff:
      enabled: true
      base-path: /staff
    redis:
      url: "${REDIS_URL}"
      worker_lock_ttl_seconds: 30
      worker_lock_renew_seconds: 10
    storage:
      type: "minio"
      minio:
        endpoint: "${MINIO_ENDPOINT:-http://minio.user-storage-deps.svc.cluster.local:9000}"
        region: "${MINIO_REGION:-us-east-1}"
        access_key: "${MINIO_ACCESS_KEY:-minioadmin}"
        secret_key: "${MINIO_SECRET_KEY:-minioadmin}"
        bucket: "${MINIO_BUCKET:-user-storage-dev}"
        force_path_style: true
        presign_ttl_seconds: 900
    oauth2:
      issuer: "http://keycloak.user-storage-deps.svc.cluster.local:8080/realms/master"
      jwks-uri: "http://keycloak.user-storage-deps.svc.cluster.local:8080/realms/master/protocol/openid-connect/certs"
    kc:
      enabled: true
      base-path: "/kc"
      signature_secret: "change-me"
