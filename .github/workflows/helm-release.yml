name: Publish user-storage Helm chart (OCI)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'deploy/charts/user-storage/**'
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            -u ${{ github.actor }} \
            --password-stdin

      - name: Build dependencies
        run: helm dependency build deploy/charts/user-storage

      - name: Lint chart
        run: helm lint deploy/charts/user-storage

      - name: Package chart
        run: helm package deploy/charts/user-storage

      - name: Push chart to GHCR
        run: |
          CHART_VERSION=$(grep '^version:' deploy/charts/user-storage/Chart.yaml | awk '{print $2}')
          helm push user-storage-$CHART_VERSION.tgz oci://ghcr.io/${{ github.repository_owner }}/charts