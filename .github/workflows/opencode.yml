name: opencode

on:
  issue_comment:
    types: [ created ]
  pull_request_review_comment:
    types: [ created ]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Bot Details
        id: bot-details
        uses: raven-actions/bot-details@v1

      - name: Setup credentials
        run: |
          git config --global user.name "${{ steps.bot-details.outputs.name }}"
          git config --global user.email "${{ steps.bot-details.outputs.email }}"
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf https://github.com/

      - name: Create opencode.json
        run: |
          cat << 'EOF' > opencode.json
          {
            "$schema": "https://opencode.ai/config.json",
            "provider": {
              "lightbridge": {
                "npm": "@ai-sdk/openai-compatible",
                "name": "LightBridge Server",
                "options": {
                  "baseURL": "{env:LIGHTBRIDGE_BASE_URL}",
                  "headers": {
                    "Authorization": "Bearer {env:LIGHTBRIDGE_API_KEY}"
                  }
                },
                "models": {
                  "gemini-3-flash": {
                    "name": "Gemini 3 Flash"
                  },
                  "glm-5": {
                    "name": "GLM-5"
                  }
                }
              }
            }
          }
          EOF

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          LIGHTBRIDGE_API_KEY: ${{ secrets.LIGHTBRIDGE_API_KEY }}
          LIGHTBRIDGE_BASE_URL: ${{ vars.LIGHTBRIDGE_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: lightbridge/glm-5
          use_github_token: true
